version: '3.8'

services:
  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sqlite
    image: docker-registry-sqlite:latest
    container_name: docker-registry-sqlite
    ports:
      - "8080:8080"
    volumes:
      - registry-data:/data
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite
      - DB_SOURCE=/data/registry.db
      - JWT_SECRET=docker-registry-secret-key-change-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - ADMIN_EMAIL=admin@localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  registry-data:
    driver: local
